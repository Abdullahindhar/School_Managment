<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fees</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#f4f4f4;
    }

    /* Header */
    .header{
      background:#2c3e50;
      color:white;
      padding:15px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .logo img{
      width:50px;
      height:50px;
      border-radius:50%;
    }

    .nav a{
      color:white;
      text-decoration:none;
      margin-left:15px;
      font-size:16px;
    }

    .nav a:hover{
      color:#f1c40f;
    }

    .nav .active{
      border-bottom:2px solid white;
      padding-bottom:4px;
    }

    /* Main */
    .container{
      padding:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:15px;
    }

    table th,
    table td{
      border:1px solid #ccc;
      padding:10px;
      text-align:center;
    }

    table th{
      background:#2c3e50;
      color:white;
    }

    table tr:hover{
      background:#ecf0f1;
    }

    h2{
      margin-top:0;
    }

    .total-box{
      margin-top:20px;
      background:#ecf0f1;
      padding:15px;
      border-radius:8px;
      font-size:20px;
      font-weight:bold;
      text-align:center;
    }

    /* Footer */
    footer{
      background:#2c3e50;
      color:white;
      text-align:center;
      padding:15px;
      margin-top:20px;
    }

    /* Responsive */
    @media(max-width:768px){

      .header{
        flex-direction:column;
        text-align:center;
      }

      .nav{
        margin-top:10px;
      }

      .nav a{
        display:inline-block;
        margin:5px;
      }

    }

  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">

    <div class="logo">
      <img src="school_logo.png" alt="logo">
      <h2>Al-Ilm School</h2>
    </div>

    <div class="nav">
      <a href="index.html">Home</a>
      <a href="Students.html">Students</a>
      <a href="Teachers.html">Teachers</a>
      <a href="Monthly_fee.html" class="active">Fees</a>
      <a href="About_Page.html">About</a>
    </div>

  </div>

  <!-- Main -->
  <div class="container">

    <div class="card">

      <h2>Monthly Fee Structure</h2>

      <table id="feeTable">

        <thead>
          <tr>
            <th>Class</th>
            <th>Fee</th>
          </tr>
        </thead>

        <tbody>

          <tr>
            <td>Nursery</td>
            <td>3000</td>
          </tr>

          <tr>
            <td>V</td>
            <td>4000</td>
          </tr>

          <tr>
            <td>X</td>
            <td>5000</td>
          </tr>

        </tbody>

      </table>

      <!-- Total -->
      <div class="total-box">
        Total Fee Collection: Rs.
        <span id="totalFee">0</span>
      </div>

    </div>

  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Al-Ilm School</p>
  </footer>

  <!-- JavaScript -->
  <script>

    // alert("Fee Structure Loaded");

    // Calculate Total Fees
    const rows = document.querySelectorAll("#feeTable tbody tr");

    let total = 0;

    rows.forEach(function(row){

      const fee = Number(row.children[1].innerText);

      total += fee;

      // Row Click Effect
      row.addEventListener("click", function(){

        rows.forEach(function(r){
          r.style.background = "";
        });

        row.style.background = "#dfe6e9";

        alert("Selected Class: " + row.children[0].innerText);

      });

    });

    // Show Total
    document.getElementById("totalFee").innerText = total;

  </script>

</body>

</html>
