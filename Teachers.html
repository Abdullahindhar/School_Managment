<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teachers</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#f4f4f4;
    }

    /* Header */
    .header{
      background:#2c3e50;
      color:white;
      padding:15px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .logo img{
      width:50px;
      height:50px;
      border-radius:50%;
    }

    .nav a{
      color:white;
      text-decoration:none;
      margin-left:15px;
      font-size:16px;
    }

    .nav a:hover{
      color:#f1c40f;
    }

    .nav .active{
      border-bottom:2px solid white;
      padding-bottom:4px;
    }

    /* Main */
    .container{
      padding:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
      margin-bottom:20px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    table th,
    table td{
      border:1px solid #ccc;
      padding:10px;
      text-align:center;
    }

    table th{
      background:#2c3e50;
      color:white;
    }

    table tr:hover{
      background:#ecf0f1;
      cursor:pointer;
    }

    /* Form */
    form{
      display:flex;
      flex-wrap:wrap;
      gap:15px;
      margin-top:15px;
    }

    input{
      flex:1;
      min-width:200px;
      padding:10px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button{
      background:#2c3e50;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:5px;
      cursor:pointer;
      margin:3px;
    }

    button:hover{
      background:#34495e;
    }

    .delete-btn{
      background:red;
    }

    .delete-btn:hover{
      background:darkred;
    }

    /* Footer */
    footer{
      background:#2c3e50;
      color:white;
      text-align:center;
      padding:15px;
      margin-top:20px;
    }

    /* Responsive */
    @media(max-width:768px){

      .header{
        flex-direction:column;
        text-align:center;
      }

      .nav{
        margin-top:10px;
      }

      .nav a{
        display:inline-block;
        margin:5px;
      }

      form{
        flex-direction:column;
      }

    }

  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">

    <div class="logo">
      <img src="school_logo.png" alt="logo">
      <h2>Al-Ilm School</h2>
    </div>

    <div class="nav">
      <a href="index.html">Home</a>
      <a href="Students.html">Students</a>
      <a href="Teachers.html" class="active">Teachers</a>
      <a href="Monthly_fee.html">Fees</a>
      <a href="About_Page.html">About</a>
    </div>

  </div>

  <!-- Main -->
  <div class="container">

    <!-- Teachers Table -->
    <div class="card">

      <h2>Teachers Records</h2>

      <table id="teacherTable">

        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Subject</th>
            <th>Salary</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>

          <tr>
            <td>T-001</td>
            <td>Sobia</td>
            <td>Math</td>
            <td>40000</td>

            <td>
              <button onclick="editTeacher(this)">Edit</button>
              <button class="delete-btn" onclick="deleteTeacher(this)">Delete</button>
            </td>
          </tr>

          <tr>
            <td>T-002</td>
            <td>Kamran</td>
            <td>Science</td>
            <td>35000</td>

            <td>
              <button onclick="editTeacher(this)">Edit</button>
              <button class="delete-btn" onclick="deleteTeacher(this)">Delete</button>
            </td>
          </tr>

          <tr>
            <td>T-003</td>
            <td>Rabia</td>
            <td>English</td>
            <td>30000</td>

            <td>
              <button onclick="editTeacher(this)">Edit</button>
              <button class="delete-btn" onclick="deleteTeacher(this)">Delete</button>
            </td>
          </tr>

        </tbody>

      </table>

    </div>

    <!-- Add Teacher -->
    <div class="card">

      <h2>Add Teacher</h2>

      <form id="teacherForm">

        <input type="text" id="teacherId" placeholder="Teacher ID" required>

        <input type="text" id="teacherName" placeholder="Teacher Name" required>

        <input type="text" id="teacherSubject" placeholder="Subject" required>

        <input type="number" id="teacherSalary" placeholder="Salary" required>

        <button type="submit">Add Teacher</button>

      </form>

    </div>

  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Al-Ilm School</p>
  </footer>

  <!-- JavaScript -->
  <script>

    const form = document.getElementById("teacherForm");
    const tableBody = document.querySelector("#teacherTable tbody");

    let editRow = null;

    // Add Teacher
    form.addEventListener("submit", function(e){

      e.preventDefault();

      const id = document.getElementById("teacherId").value;
      const name = document.getElementById("teacherName").value;
      const subject = document.getElementById("teacherSubject").value;
      const salary = document.getElementById("teacherSalary").value;

      // Edit Teacher
      if(editRow){

        editRow.cells[0].innerText = id;
        editRow.cells[1].innerText = name;
        editRow.cells[2].innerText = subject;
        editRow.cells[3].innerText = salary;

        alert("Teacher Updated Successfully");

        editRow = null;

      }

      // Add New Teacher
      else{

        const newRow = document.createElement("tr");

        newRow.innerHTML = `
          <td>${id}</td>
          <td>${name}</td>
          <td>${subject}</td>
          <td>${salary}</td>

          <td>
            <button onclick="editTeacher(this)">Edit</button>
            <button class="delete-btn" onclick="deleteTeacher(this)">Delete</button>
          </td>
        `;

        tableBody.appendChild(newRow);

        alert("Teacher Added Successfully");

      }

      form.reset();

    });

    // Delete Teacher
    function deleteTeacher(btn){

      if(confirm("Are you sure you want to delete this teacher?")){

        btn.parentElement.parentElement.remove();

      }

    }

    // Edit Teacher
    function editTeacher(btn){

      editRow = btn.parentElement.parentElement;

      document.getElementById("teacherId").value = editRow.cells[0].innerText;
      document.getElementById("teacherName").value = editRow.cells[1].innerText;
      document.getElementById("teacherSubject").value = editRow.cells[2].innerText;
      document.getElementById("teacherSalary").value = editRow.cells[3].innerText;

    }

  </script>

</body>

</html>
